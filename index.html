<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fight Elite AI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Oswald', sans-serif;
background:#0a0a0a;
color:white;
}

header {
padding:20px;
text-align:center;
font-size:24px;
}

.container {
padding:15px;
padding-bottom:100px;
}

.card {
background:#1c1c1e;
padding:15px;
border-radius:15px;
margin-bottom:12px;
}

h2 {color:#ff3b30;}

.chat {
height:350px;
overflow:auto;
background:#111;
padding:10px;
border-radius:10px;
}

.msg {margin-bottom:10px;}
.user {color:#00ff88;}
.ai {color:#ff3b30;}

input {
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
background:#2c2c2e;
color:white;
}

button {
width:100%;
padding:14px;
margin-top:6px;
border:none;
border-radius:12px;
background:#ff3b30;
color:white;
}

.nav {
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.nav button {
flex:1;
background:none;
color:#888;
}

.nav button.active {color:#ff3b30;}

.hidden {display:none;}
</style>
</head>

<body>

<header>🥊 FIGHT ELITE AI PRO</header>

<div class="container">

<div id="home">
<div class="card">
<h2>Coach intelligente</h2>
<p>Scrivi come ti senti o cosa vuoi migliorare</p>
</div>
</div>

<div id="ai" class="hidden">

<div class="card">
<h2>🧠 Coach & Nutrizione</h2>

<div id="chat" class="chat"></div>

<input id="input" placeholder="Es: voglio massa, sono stanco, non dimagrisco">
<button onclick="send()">Invia</button>

</div>

</div>

</div>

<div class="nav">
<button onclick="nav('home',this)" class="active">Home</button>
<button onclick="nav('ai',this)">AI</button>
</div>

<script>

// NAV
function nav(p,btn){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// MEMORIA
let userProfile = {
goal: "",
energy: "",
problem: ""
};

// IA AVANZATA
function getAI(msg){

msg = msg.toLowerCase();

// rileva obiettivo
if(msg.includes("massa")) userProfile.goal="massa";
if(msg.includes("dimagr") || msg.includes("definiz")) userProfile.goal="definizione";

// rileva energia
if(msg.includes("stanco")) userProfile.energy="bassa";
if(msg.includes("carico") || msg.includes("forte")) userProfile.energy="alta";

// problemi
if(msg.includes("non cresco")) userProfile.problem="massa";
if(msg.includes("non dimagrisco")) userProfile.problem="grasso";

// RISPOSTA
let risposta = "";

// OBIETTIVO MASSA
if(userProfile.goal==="massa"){
risposta += "Per massa: aumenta calorie +300, proteine alte.\n";
risposta += "Allenamento: spingi su multiarticolari.\n";
}

// DEFINIZIONE
if(userProfile.goal==="definizione"){
risposta += "Per definizione: deficit calorico.\n";
risposta += "Aggiungi cardio post workout.\n";
}

// ENERGIA
if(userProfile.energy==="bassa"){
risposta += "Se sei stanco: riduci volume oggi.\n";
risposta += "Dormi almeno 7-8 ore.\n";
}

if(userProfile.energy==="alta"){
risposta += "Se sei carico: aumenta intensità oggi.\n";
}

// PROBLEMI
if(userProfile.problem==="massa"){
risposta += "Non cresci? Probabile calorie basse.\n";
}

if(userProfile.problem==="grasso"){
risposta += "Non dimagrisci? Taglia carbo la sera.\n";
}

// fallback
if(risposta===""){
risposta = "Allenati forte, mangia pulito, recupera.";
}

return risposta;
}

// CHAT
function send(){

let input = document.getElementById("input");
let chat = document.getElementById("chat");

let msg = input.value;

chat.innerHTML += `<div class="msg user">Tu: ${msg}</div>`;

let ai = getAI(msg);

chat.innerHTML += `<div class="msg ai">Coach: ${ai}</div>`;

input.value="";
chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
