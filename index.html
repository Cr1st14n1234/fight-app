<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fight Elite Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Oswald', sans-serif;
background:linear-gradient(180deg,#0a0a0a,#1c1c1e);
color:white;
}

header {
padding:20px;
text-align:center;
font-size:26px;
font-weight:700;
letter-spacing:2px;
}

.container {
padding:15px;
padding-bottom:100px;
}

.card {
background:linear-gradient(145deg,#1c1c1e,#2a2a2c);
padding:15px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

h2 {
color:#ff453a;
margin-bottom:8px;
}

.progress-bar {
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.progress-fill {
height:100%;
background:#00ff88;
width:0%;
}

.exercise img {
width:100%;
border-radius:12px;
margin-top:8px;
}

.series button {
width:22%;
margin:2px;
background:#333;
border-radius:8px;
}

.series button.active {
background:#00ff88;
color:black;
}

button {
width:100%;
padding:14px;
margin-top:6px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff3b30,#ff0000);
color:white;
font-weight:600;
}

.nav {
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.nav button {
flex:1;
background:none;
color:#888;
}

.nav button.active {
color:#ff453a;
}

.hidden {display:none;}

#timer {
font-size:40px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<header>🥊 FIGHT ELITE ULTIMATE</header>

<div class="container">

<!-- HOME -->
<div id="home">

<div class="card">
<h2>🎮 Livello</h2>
<p id="level"></p>
<p id="xp"></p>
</div>

<div class="card">
<h2>🔥 Streak</h2>
<p id="streak"></p>
</div>

<div class="card">
<h2>📊 Progresso</h2>
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
<p id="progressText"></p>
</div>

<div class="card">
<h2>🧠 Coach</h2>
<p id="coach"></p>
</div>

</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">

<div class="card">
<button onclick="loadWorkout('A')">MARTEDÌ PUSH</button>
<button onclick="loadWorkout('B')">GIOVEDÌ PULL</button>
<button onclick="loadWorkout('C')">SABATO GAMBE</button>
</div>

<div id="workoutContent"></div>

</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
<div class="card">
<h2>🥊 Timer Fight</h2>

<button onclick="startTimer(180)">3 min</button>
<button onclick="startTimer(120)">2 min</button>
<button onclick="startTimer(60)">1 min</button>

<p id="timer">0</p>
</div>
</div>

<!-- DIETA -->
<div id="diet" class="hidden">
<div class="card">
<h2>🍽 Dieta</h2>

<input id="peso" placeholder="Peso kg">
<input id="altezza" placeholder="Altezza cm">

<button onclick="dieta()">Calcola</button>

<p id="dietResult"></p>
</div>
</div>

</div>

<div class="nav">
<button onclick="nav('home',this)" class="active">Home</button>
<button onclick="nav('workout',this)">Workout</button>
<button onclick="nav('timerPage',this)">Timer</button>
<button onclick="nav('diet',this)">Dieta</button>
</div>

<script>

function nav(p,btn){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// DATI
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let progress = parseInt(localStorage.getItem("progress")) || 0;

function level(){ return Math.floor(xp/100)+1; }

// HOME
function updateHome(){

document.getElementById("level").innerText="Livello "+level();
document.getElementById("xp").innerText=xp+" XP";
document.getElementById("streak").innerText=streak+" giorni";

document.getElementById("progressFill").style.width=progress+"%";
document.getElementById("progressText").innerText=progress+"%";

let coach="Inizia.";

if(level()>3) coach="Stai diventando pericoloso.";
if(streak>3) coach="Costanza da fighter.";
if(progress>70) coach="Finisci forte.";

document.getElementById("coach").innerText=coach;
}

// WORKOUT
function loadWorkout(t){

let img="https://upload.wikimedia.org/wikipedia/commons/0/0c/Bench_press.gif";

let w={
A:["Corda 5 min","Stretching dinamico","Panca 5x5","Military 4x6","Dips 4x10","Push-up esplosivi","Corsa 10 min","Stretching finale"],
B:["Corda","Stretching","Stacco 5x5","Rematore 4x8","Trazioni","Curl","Sprint","Stretching"],
C:["Corda","Stretching","Squat 5x5","Affondi","Jump squat","Calf","Corsa","Stretching"]
};

let html="";

w[t].forEach(e=>{
html+=`
<div class="card">
<h3>${e}</h3>
<img src="${img}" onclick="window.open('${img}')">

<div class="series">
<button onclick="done()">1</button>
<button onclick="done()">2</button>
<button onclick="done()">3</button>
<button onclick="done()">4</button>
</div>

</div>`;
});

document.getElementById("workoutContent").innerHTML=html;
}

// COMPLETA
function done(){
progress+=5;
xp+=10;

if(progress>=100){
streak++;
progress=0;
}

localStorage.setItem("xp",xp);
localStorage.setItem("streak",streak);
localStorage.setItem("progress",progress);

updateHome();
}

// TIMER
let i,t;
function startTimer(sec){
clearInterval(i);
t=sec;

i=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0){clearInterval(i); alert("ROUND FINITO");}
},1000);
}

// DIETA
function dieta(){
let peso=document.getElementById("peso").value;
let altezza=document.getElementById("altezza").value;

let cal=(10*peso+6.25*altezza-100)*1.5;

document.getElementById("dietResult").innerText=
"Calorie: "+Math.round(cal)+"\nProteine: "+peso*2+"g\n\nColazione: uova + avena\nPranzo: riso + pollo\nCena: carne + verdure\nSpuntini: frutta + frutta secca";
}

updateHome();

</script>

</body>
</html>
