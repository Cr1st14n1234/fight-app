<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight App Elite</title>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont;
    background:#0b0b0b;
    color:white;
}

header {
    text-align:center;
    padding:15px;
    font-size:20px;
    background:#111;
    border-bottom:1px solid #222;
}

.container {
    padding:15px;
}

.card {
    background:#1a1a1a;
    padding:15px;
    border-radius:20px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:15px;
    margin:5px 0;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#ff3c3c,#ff0000);
    color:white;
    font-size:15px;
}

input {
    width:100%;
    padding:12px;
    margin:5px 0;
    border-radius:10px;
    border:none;
    background:#2a2a2a;
    color:white;
}

#timer {
    font-size:40px;
    text-align:center;
}

.nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111;
    border-top:1px solid #222;
}

.nav button {
    flex:1;
    background:none;
    font-size:14px;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>🥊 Fight App Elite</header>

<div class="container">

<!-- DASHBOARD -->
<div id="home">
<div class="card">
<h2>🔥 Stato</h2>
<p>Allenati oggi. Rimani veloce. Rimani leggero.</p>
</div>
</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">
<div class="card">
<h2>Allenamenti</h2>
<button onclick="showDay('A')">PUSH</button>
<button onclick="showDay('B')">PULL</button>
<button onclick="showDay('C')">GAMBE</button>
</div>

<div id="workoutContent"></div>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
<div class="card">
<h2>Timer Fight</h2>
<button onclick="startTimer(180)">3 min</button>
<button onclick="startTimer(120)">2 min</button>
<button onclick="startTimer(60)">1 min</button>
<p id="timer">0</p>
</div>
</div>

<!-- TRACKER -->
<div id="tracker" class="hidden">
<div class="card">
<h2>Progressi</h2>
<input id="exercise" placeholder="Esercizio">
<input id="weight" placeholder="Peso">
<button onclick="saveData()">Salva</button>
<p id="history"></p>
</div>
</div>

</div>

<!-- NAVBAR -->
<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('workout')">🏋️</button>
<button onclick="showPage('timerPage')">⏱</button>
<button onclick="showPage('tracker')">📊</button>
</div>

<script>

function showPage(page){
    document.querySelectorAll('.container > div').forEach(div=>{
        div.classList.add('hidden');
    });
    document.getElementById(page).classList.remove('hidden');
}

function showDay(day){
    const workouts = {
        A:"Panca 5x5<br>Military 4x6<br>Push Press<br>Push-up esplosivi",
        B:"Stacco 5x5<br>Rematore 4x8<br>Farmer walk",
        C:"Squat 5x5<br>Bulgarian<br>Jump squat"
    };

    document.getElementById("workoutContent").innerHTML =
    "<div class='card'>"+workouts[day]+"</div>";
}

let interval;

function startTimer(seconds){
    clearInterval(interval);
    let time = seconds;
    document.getElementById("timer").innerText = time;

    interval = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = time;

        if(time<=0){
            clearInterval(interval);
            alert("FINE ROUND");
        }
    },1000);
}

function saveData(){
    let ex = document.getElementById("exercise").value;
    let w = document.getElementById("weight").value;

    let data = JSON.parse(localStorage.getItem("log")) || [];
    data.push(ex + ": " + w + "kg");

    localStorage.setItem("log", JSON.stringify(data));
    showHistory();
}

function showHistory(){
    let data = JSON.parse(localStorage.getItem("log")) || [];
    document.getElementById("history").innerHTML = data.join("<br>");
}

showHistory();

</script>

</body>
</html
