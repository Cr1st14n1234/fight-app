<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fight App Elite</title>

<!-- ICONA IPHONE -->
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont;
    background:#000;
    color:white;
}

header {
    text-align:center;
    padding:18px;
    font-size:18px;
    font-weight:600;
    border-bottom:1px solid #1c1c1e;
}

.container {
    padding:15px;
    padding-bottom:90px;
}

.card {
    background:#1c1c1e;
    padding:16px;
    border-radius:18px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:16px;
    margin-top:8px;
    border:none;
    border-radius:14px;
    background:#ff3b30;
    color:white;
    font-size:16px;
}

input, select {
    width:100%;
    padding:14px;
    margin-top:8px;
    border-radius:12px;
    border:none;
    background:#2c2c2e;
    color:white;
}

.nav {
    position:fixed;
    bottom:0;
    width:100%;
    height:75px;
    display:flex;
    background:#111;
    border-top:1px solid #222;
}

.nav button {
    flex:1;
    background:none;
    font-size:12px;
    color:#aaa;
}

#timer {
    font-size:42px;
    text-align:center;
    margin-top:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>🥊 Fight App Elite</header>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card">
<h2>🔥 Dashboard</h2>
<p id="coach">Inserisci dati per attivare coach</p>
<button onclick="updateCoach()">Aggiorna Coach</button>
</div>
</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">
<div class="card">
<h2>Allenamento</h2>
<button onclick="showWorkout('A')">🔥 PUSH</button>
<button onclick="showWorkout('B')">💪 PULL</button>
<button onclick="showWorkout('C')">🦵 GAMBE</button>
</div>
<div id="workoutContent"></div>
</div>

<!-- CONDITIONING -->
<div id="conditioning" class="hidden">
<div class="card">
<h2>🥊 Condizionamento</h2>
<p id="cond">Inserisci dati per personalizzare</p>
</div>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
<div class="card">
<h2>⏱ Timer</h2>
<button onclick="startTimer(180)">Round Fight (3 min)</button>
<button onclick="startTimer(120)">Round Training (2 min)</button>
<button onclick="startTimer(60)">HIIT (1 min)</button>
<p id="timer">0</p>
</div>
</div>

<!-- TRACKER -->
<div id="tracker" class="hidden">
<div class="card">
<h2>📊 Progressi</h2>
<input id="exercise" placeholder="Esercizio">
<input id="weight" placeholder="Peso">
<button onclick="saveData()">Salva</button>
<p id="history"></p>
</div>
</div>

<!-- DIETA -->
<div id="diet" class="hidden">
<div class="card">
<h2>🍽 Dieta</h2>
<input id="peso" placeholder="Peso (kg)">
<input id="altezza" placeholder="Altezza (cm)">
<select id="goal">
<option value="massa">Massa</option>
<option value="definizione">Definizione</option>
</select>
<button onclick="calcola()">Calcola</button>
<p id="dietResult"></p>
</div>
</div>

</div>

<!-- NAVBAR -->
<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('workout')">🏋️</button>
<button onclick="showPage('conditioning')">🥊</button>
<button onclick="showPage('timerPage')">⏱</button>
<button onclick="showPage('tracker')">📊</button>
<button onclick="showPage('diet')">🍽</button>
</div>

<script>

// NAV
function showPage(p){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
}

// COACH IA
function updateCoach(){
let peso = localStorage.getItem("peso");

let msg = "Inserisci dati dieta";

if(peso){
if(peso < 70) msg = "Sei leggero → aumenta forza e massa";
else if(peso > 85) msg = "Sei pesante → lavora su velocità";
else msg = "Perfetto → migliora esplosività";
}

document.getElementById("coach").innerText = msg;
}

// WORKOUT
function showWorkout(day){
let w = {
A:"Panca 5x5 • Military • Push Press • Push-up",
B:"Stacco 5x5 • Rematore • Farmer walk",
C:"Squat 5x5 • Bulgarian • Jump squat"
};

document.getElementById("workoutContent").innerHTML =
"<div class='card'>"+w[day]+"</div>";
}

// CONDIZIONAMENTO
function updateCond(){
let peso = localStorage.getItem("peso");

let c = "Corda 5x2 min + corsa 20 min";

if(peso > 85) c = "Corda 7x2 min + corsa 30 min";
if(peso < 70) c = "Corda 4x2 min + sprint";

document.getElementById("cond").innerText = c;
}

// TIMER
let interval;
function startTimer(sec){
clearInterval(interval);
let t = sec;

interval = setInterval(()=>{
t--;
document.getElementById("timer").innerText = t;
if(t<=0){clearInterval(interval); alert("FINE ROUND");}
},1000);
}

// TRACKER
function saveData(){
let ex = document.getElementById("exercise").value;
let w = document.getElementById("weight").value;

let data = JSON.parse(localStorage.getItem("log")) || [];
data.push(ex + ": " + w + "kg");

localStorage.setItem("log", JSON.stringify(data));
showHistory();
}

function showHistory(){
let data = JSON.parse(localStorage.getItem("log")) || [];
document.getElementById("history").innerHTML = data.join("<br>");
}

// DIETA
function calcola(){
let peso = parseFloat(document.getElementById("peso").value);
let goal = document.getElementById("goal").value;

localStorage.setItem("peso", peso);

let cal = peso * 30;
if(goal=="massa") cal+=300;
if(goal=="definizione") cal-=300;

document.getElementById("dietResult").innerText =
"Calorie: "+cal+" kcal | Proteine: "+(peso*2)+"g";

updateCoach();
updateCond();
}

showHistory();

// TOUCH FIX IPHONE
document.addEventListener("touchstart", function(){}, true);

</script>

</body>
</html
