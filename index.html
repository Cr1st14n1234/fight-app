<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fight Elite Ultimate</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {margin:0;font-family:-apple-system;background:#0b0b0c;color:white;}
header {padding:20px;text-align:center;font-size:22px;font-weight:600;}

.container {padding:15px;padding-bottom:100px;}

.card {
background:#1c1c1e;
padding:15px;
border-radius:16px;
margin-bottom:12px;
}

h2 {margin-bottom:10px;}

button {
width:100%;
padding:14px;
margin-top:6px;
border:none;
border-radius:12px;
background:#ff3b30;
color:white;
}

input, select {
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:none;
background:#2c2c2e;
color:white;
}

.exercise img {
width:100%;
border-radius:10px;
margin-top:6px;
}

.nav {
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.nav button {
flex:1;
background:none;
color:#888;
}

.nav button.active {color:#ff3b30;}

.hidden {display:none;}
</style>
</head>

<body>

<header>🥊 Fight Elite Ultimate</header>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card">
<h2>📅 Settimana</h2>
<p>Martedì → PUSH</p>
<p>Giovedì → PULL</p>
<p>Sabato → GAMBE</p>
</div>

<div class="card">
<h2>🔥 Oggi</h2>
<p id="today"></p>
</div>

<div class="card">
<h2>📊 Stato</h2>
<p id="stats"></p>
</div>

<div class="card">
<h2>🧠 Coach</h2>
<p id="coach"></p>
</div>
</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">
<div class="card">
<h2>Allenamento</h2>
<button onclick="loadWorkout('A')">Martedì PUSH</button>
<button onclick="loadWorkout('B')">Giovedì PULL</button>
<button onclick="loadWorkout('C')">Sabato GAMBE</button>
</div>

<div id="workoutContent"></div>
</div>

<!-- DIETA -->
<div id="diet" class="hidden">
<div class="card">
<h2>Dieta</h2>

<input id="peso" placeholder="Peso kg">
<input id="altezza" placeholder="Altezza cm">

<select id="goal">
<option value="massa">Massa</option>
<option value="definizione">Definizione</option>
</select>

<button onclick="dieta()">Calcola</button>

<p id="dietResult"></p>
</div>
</div>

</div>

<div class="nav">
<button onclick="nav('home',this)" class="active">Home</button>
<button onclick="nav('workout',this)">Workout</button>
<button onclick="nav('diet',this)">Dieta</button>
</div>

<script>

// NAV
function nav(p,btn){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// GIORNO
function getToday(){
let d=new Date().getDay();
if(d==2) return "PUSH";
if(d==4) return "PULL";
if(d==6) return "GAMBE";
return "Riposo / Kickboxing";
}

// WORKOUT COMPLETO
function loadWorkout(t){

let w={
A:["Corda 5 min","Stretching","Panca 5x5","Military 4x6","Dips 4x10","Push-up","Corsa 10 min","Stretching finale"],
B:["Corda","Stretching","Stacco 5x5","Rematore 4x8","Trazioni","Curl","Sprint","Stretching"],
C:["Corda","Stretching","Squat 5x5","Affondi","Jump squat","Calf","Corsa","Stretching"]
};

let html="";
w[t].forEach(e=>{
html+=`
<div class="card exercise">
<p>${e}</p>
<img src="https://source.unsplash.com/400x300/?fitness" onclick="window.open(this.src)">
</div>`;
});

document.getElementById("workoutContent").innerHTML=html;
}

// DIETA
function dieta(){
let peso=document.getElementById("peso").value;
let altezza=document.getElementById("altezza").value;

localStorage.setItem("peso",peso);

let cal=(10*peso+6.25*altezza-100)*1.5;

document.getElementById("dietResult").innerText=
"Calorie: "+Math.round(cal)+"\n\nColazione: uova + avena\nPranzo: riso + pollo\nCena: carne + verdure";

updateHome();
}

// HOME UPDATE
function updateHome(){
document.getElementById("today").innerText="Oggi: "+getToday();

let peso=localStorage.getItem("peso");

if(peso){
document.getElementById("stats").innerText="Peso: "+peso+" kg";
document.getElementById("coach").innerText="Allenati forte e recupera bene.";
}else{
document.getElementById("coach").innerText="Inserisci dati e inizia.";
}
}

updateHome();

</script>

</body>
</html>
