<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight Elite Pro</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body {
margin:0;
font-family:-apple-system;
background:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438') no-repeat center/cover;
color:white;
}

.overlay {
background:rgba(0,0,0,0.85);
min-height:100vh;
}

header {
padding:20px;
text-align:center;
font-size:20px;
font-weight:600;
}

.container {
padding:15px;
padding-bottom:100px;
}

.card {
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.exercise img {
width:100%;
border-radius:10px;
margin-top:5px;
}

button {
width:100%;
padding:14px;
margin-top:5px;
border:none;
border-radius:12px;
background:#ff3c3c;
color:white;
}

.series button {
width:22%;
margin:2px;
background:#333;
}

.series button.active {
background:#00ff88;
color:black;
}

.nav {
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.nav button {
flex:1;
background:none;
color:#aaa;
}

.nav button.active {
color:#ff3c3c;
}

.hidden {display:none;}

#timer {
font-size:40px;
text-align:center;
}
</style>
</head>
<body>
<div class="overlay">
<header>🥊 Fight Elite Pro</header>
<div class="container">
<!-- HOME -->
<div id="home">
<div class="card">
<h2>Coach</h2>
<p id="coach"></p>
<button onclick="updateCoach()">Aggiorna</button>
</div>
</div>
<!-- WORKOUT -->
<div id="workout" class="hidden">
<div class="card">
<h2>Allenamenti</h2>
<button onclick="loadWorkout('A')">PUSH</button>
<button onclick="loadWorkout('B')">PULL</button>
<button onclick="loadWorkout('C')">GAMBE</button>
</div>
<div id="workoutContent"></div>
</div>
<!-- CONDITIONING -->
<div id="cond" class="hidden">
<div class="card">
<h2>Condizionamento</h2>
<p>🥊 Corda: 5-7 round x 2 min</p>
<p>🏃 Corsa: 20-30 min</p>
<p>⚡ Sprint: 6x100m</p>
<h3>Stretching</h3>
<p>Quadricipiti 30s</p>
<p>Femorali 30s</p>
<p>Spalle 30s</p>
<p>Schiena 30s</p>
</div>
</div>
<!-- DIETA -->
<div id="diet" class="hidden">
<div class="card">
<h2>Dieta</h2>
<input id="peso" placeholder="Peso">
<select id="goal">
<option value="massa">Massa</option>
<option value="definizione">Definizione</option>
</select>
<button onclick="dieta()">Calcola</button>
<p id="dietResult"></p>
</div>
</div>
<!-- TIMER -->
<div id="timerPage" class="hidden">
<div class="card">
<h2>Timer</h2>
<button onclick="startTimer(180)">3 min</button>
<button onclick="startTimer(120)">2 min</button>
<button onclick="startTimer(60)">1 min</button>
<p id="timer">0</p>
</div>
</div>
</div>
<div class="nav">
<button onclick="nav('home',this)" class="active">🏠</button>
<button onclick="nav('workout',this)">🏋️</button>
<button onclick="nav('cond',this)">🥊</button>
<button onclick="nav('diet',this)">🍽</button>
<button onclick="nav('timerPage',this)">⏱</button>
</div>
</div>
<script>

// NAV
function nav(page,btn){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(page).classList.remove('hidden');

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// COACH
function updateCoach(){
document.getElementById("coach").innerText =
"Allenati da fighter: forza, velocità e resistenza.";
}

// TIMER
let interval;
function startTimer(sec){
clearInterval(interval);
let t=sec;

interval=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0){
clearInterval(interval);
beep();
alert("FINE");
}
},1000);
}

// SUONO
function beep(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),200);
}

// WORKOUT COMPLETO
function loadWorkout(type){

let ex = {
A:[
["Panca","https://upload.wikimedia.org/wikipedia/commons/0/0c/Bench_press.gif"],
["Military","https://upload.wikimedia.org/wikipedia/commons/8/8c/Overhead_press.gif"],
["Push Press","https://upload.wikimedia.org/wikipedia/commons/3/3b/Push_press.gif"],
["Dips","https://upload.wikimedia.org/wikipedia/commons/8/89/Dips.gif"],
["Push-up","https://upload.wikimedia.org/wikipedia/commons/4/4c/Push-up.gif"]
],
B:[
["Stacco","https://upload.wikimedia.org/wikipedia/commons/3/3d/Deadlift.gif"],
["Rematore","https://upload.wikimedia.org/wikipedia/commons/2/2b/Bent-over_row.gif"],
["Trazioni","https://upload.wikimedia.org/wikipedia/commons/4/4f/Pull-up.gif"],
["Curl","https://upload.wikimedia.org/wikipedia/commons/7/7e/Biceps_curl.gif"]
],
C:[
["Squat","https://upload.wikimedia.org/wikipedia/commons/3/3e/Squat.gif"],
["Affondi","https://upload.wikimedia.org/wikipedia/commons/9/94/Lunge.gif"],
["Jump Squat","https://upload.wikimedia.org/wikipedia/commons/6/6c/Jump_squat.gif"],
["Calf","https://upload.wikimedia.org/wikipedia/commons/1/1d/Calf_raise.gif"]
]
};

let html="";

ex[type].forEach((e,i)=>{
html+=`
<div class="card">
<h3>${e[0]}</h3>
<img src="${e[1]}">
<div class="series">
<button onclick="done(this)">1</button>
<button onclick="done(this)">2</button>
<button onclick="done(this)">3</button>
<button onclick="done(this)">4</button>
</div>
</div>`;
});

document.getElementById("workoutContent").innerHTML=html;
}

// SERIE COMPLETATE + SALVATAGGIO
function done(btn){
btn.classList.toggle("active");
localStorage.setItem("progress","saved");
}

// DIETA
function dieta(){
let peso=document.getElementById("peso").value;
let goal=document.getElementById("goal").value;

let cal=peso*30;
if(goal=="massa") cal+=300;
if(goal=="definizione") cal-=300;

document.getElementById("dietResult").innerText=
"Calorie: "+cal+" kcal\nProteine: "+(peso*2)+"g\nCarbo: "+(peso*4)+"g\nGrassi: "+(peso*1)+"g";
}

</script>
</body>
</html>
:::
